name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Refresh SHFE/LME tin quotes
        run: python scripts/fetch_quotes.py
      - name: Prepare static site
        run: |
          mkdir _site
          cp index.html quotes.json .nojekyll _site/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
